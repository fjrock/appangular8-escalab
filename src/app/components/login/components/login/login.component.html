<section class="login-wrap">
  <div class="app-container">
    <form [formGroup]="form" class="login-card glass-panel" (ngSubmit)="login(form.value)">
      <h2>Iniciar sesion</h2>
      <p>Accede a la zona administrable del pub.</p>

      <input formControlName="email" type="email" class="form-control modern-input" placeholder="Correo electronico">
      <input formControlName="password" type="password" class="form-control modern-input" placeholder="Contrasena">

      <button [disabled]="form.invalid" class="btn-modern" type="submit">Ingresar</button>

      <div *ngIf="error" class="alert alert-danger mt-3" role="alert">
        {{mensajeError}}
      </div>
    </form>
  </div>
</section>
